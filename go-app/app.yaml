
# app.yaml file for GoSkrafl on Google App Engine

runtime: go123

service: moves

instance_class: F1

automatic_scaling:
  max_instances: 2

inbound_services:
- warmup

includes:
- env.yaml

handlers:
- url: /moves
  script: auto
  secure: always
- url: /wordcheck
  script: auto
  secure: always
- url: /riddle
  script: auto
  secure: always
- url: /_ah/warmup
  script: auto
  secure: always
